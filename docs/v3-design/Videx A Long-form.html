<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Videx · A Long-form — Home & For You</title>
<style>
  html, body { margin:0; padding:0; background:#0a0a0f; }
  #root { min-height: 100vh; }
  /* Top tab switcher — review-only chrome, parked top-right */
  .vxal-tabs {
    position: fixed; top: 14px; right: 14px;
    z-index: 100; display: flex; gap: 3px; padding: 4px;
    background: rgba(20,20,28,0.85); backdrop-filter: blur(20px);
    border-radius: 99px; border: 0.5px solid rgba(255,255,255,0.08);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .vxal-tab {
    padding: 6px 14px; border-radius: 99px; border: none;
    background: transparent; color: rgba(245,241,232,0.55);
    font-family: "DM Sans", system-ui, sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.3px; cursor: pointer; transition: all .2s;
  }
  .vxal-tab.active { background: #e85d25; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="videx-shared.jsx"></script>
<script type="text/babel" src="videx-direction-a.jsx"></script>
<script type="text/babel" src="videx-direction-a-long.jsx"></script>

<script type="text/babel">
function App() {
  const [tab, setTab] = React.useState('home');
  return (
    <>
      <div className="vxal-tabs">
        <button className={'vxal-tab' + (tab === 'home' ? ' active' : '')} onClick={() => setTab('home')}>Home</button>
        <button className={'vxal-tab' + (tab === 'foryou' ? ' active' : '')} onClick={() => setTab('foryou')}>For You</button>
      </div>
      {tab === 'home' ? <window.ALHome/> : <window.ALForYou/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
