name: Typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # No linter is currently configured in this repo (no ESLint/Biome).
      # When one is added, wire it up here, e.g.:
      # - name: Lint
      #   run: npm run lint
