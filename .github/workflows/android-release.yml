name: Android Release (AAB)

# Builds the signed production Android App Bundle on a clean Linux runner
# (this sidesteps the Windows-local problems: the CMake/ninja "build.ninja
# still dirty" regeneration loop, and eas-cli's inability to package the
# junction-based shared tree — symlink EPERM). Then, ON A VERSION TAG, it
# submits the AAB to Google Play's internal testing track.
#
# Triggers:
#   • push a tag `v*`  (e.g. `git tag v2.0.2 && git push --tags`) → build + submit to Play
#   • manual "Run workflow"                                        → build-only (artifact, no submit)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64       base64 of the upload keystore (videx-release, 99:CE:FF:7E)
#   VIDEX_UPLOAD_STORE_PASSWORD   keystore store password
#   VIDEX_UPLOAD_KEY_PASSWORD     key password (alias videx-key)
#   EXPO_PUBLIC_SUPABASE_URL      } public client config (EXPO_PUBLIC_*),
#   EXPO_PUBLIC_SUPABASE_ANON_KEY }  inlined into the JS bundle at build time
#   EXPO_PUBLIC_API_PROXY_URL     }
#   EXPO_PUBLIC_SENTRY_DSN        Sentry DSN (crash reporting) — inlined into the JS bundle
#   SENTRY_AUTH_TOKEN             OPTIONAL — enables source-map upload (project:releases + org:read
#                                 scope). If unset, the build skips the upload and still succeeds.
#   PLAY_SERVICE_ACCOUNT_JSON     Google Play service-account JSON (raw file contents) — submit step

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full repo — native/ depends on ../src/lib)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native deps (postinstall symlinks ../src/lib into native/)
        working-directory: native
        run: npm install

      - name: Recreate native/.env (public EXPO_PUBLIC_* values)
        working-directory: native
        run: |
          {
            echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}"
            echo "EXPO_PUBLIC_API_PROXY_URL=${{ secrets.EXPO_PUBLIC_API_PROXY_URL }}"
            echo "EXPO_PUBLIC_SENTRY_DSN=${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}"
          } > .env

      - name: Restore upload keystore (path the signing plugin expects)
        run: |
          mkdir -p "$HOME/Documents/Code"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$HOME/Documents/Code/videx-release"
          test -s "$HOME/Documents/Code/videx-release" || { echo "::error::keystore empty — is ANDROID_KEYSTORE_BASE64 set?"; exit 1; }

      - name: Prebuild Android (injects release signing via the config plugin)
        working-directory: native
        run: npx expo prebuild --platform android --no-install

      - name: Build signed release AAB
        working-directory: native/android
        env:
          ORG_GRADLE_PROJECT_VIDEX_UPLOAD_STORE_PASSWORD: ${{ secrets.VIDEX_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VIDEX_UPLOAD_KEY_PASSWORD: ${{ secrets.VIDEX_UPLOAD_KEY_PASSWORD }}
          # Sentry source-map upload during bundleRelease. Runs ONLY when
          # SENTRY_AUTH_TOKEN is set; otherwise auto-upload is disabled so the
          # build still succeeds (org/project/url come from the sentry.properties
          # that prebuild wrote from app.json). Runtime crash capture is
          # unaffected either way — that comes from EXPO_PUBLIC_SENTRY_DSN.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DISABLE_AUTO_UPLOAD: ${{ secrets.SENTRY_AUTH_TOKEN == '' && 'true' || 'false' }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Verify signing fingerprint (expect SHA256 99:CE:FF:7E…)
        run: keytool -printcert -jarfile native/android/app/build/outputs/bundle/release/app-release.aab | grep -iA1 'SHA256'

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: videx-release-aab
          path: native/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Submit to Google Play — ONLY on a version tag (manual runs stay build-only).
      - name: Submit to Google Play (internal testing track)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.videx.streaming
          releaseFiles: native/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
