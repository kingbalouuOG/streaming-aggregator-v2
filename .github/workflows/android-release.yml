name: Android Release (AAB)

# Builds the signed production Android App Bundle on a clean Linux runner.
# This sidesteps the Windows-local problems we hit: the CMake/ninja
# "build.ninja still dirty" regeneration loop, and eas-cli's inability to
# package the junction-based shared tree (symlink EPERM). On Linux the
# shared tree mounts as a real symlink and the NDK build is well-behaved.
#
# Trigger: manual (Actions tab → "Run workflow"), or:
#   gh workflow run android-release.yml --ref release/native-2.0.1
# Output: the AAB is attached to the run as the "videx-release-aab" artifact.
#
# Required repository secrets (see the runbook / README):
#   ANDROID_KEYSTORE_BASE64       base64 of the upload keystore (videx-release, 99:CE:FF:7E)
#   VIDEX_UPLOAD_STORE_PASSWORD   keystore store password
#   VIDEX_UPLOAD_KEY_PASSWORD     key password (alias videx-key)
#   EXPO_PUBLIC_SUPABASE_URL      } public client config (EXPO_PUBLIC_*),
#   EXPO_PUBLIC_SUPABASE_ANON_KEY }  inlined into the JS bundle at build time
#   EXPO_PUBLIC_API_PROXY_URL     }

on:
  workflow_dispatch:
  push:
    branches: [release/native-2.0.1]
    paths: ['native/**', 'src/**', '.github/workflows/android-release.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full repo — native/ depends on ../src/lib)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native deps (postinstall symlinks ../src/lib into native/)
        working-directory: native
        run: npm install

      - name: Recreate native/.env (public EXPO_PUBLIC_* values)
        working-directory: native
        run: |
          {
            echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}"
            echo "EXPO_PUBLIC_API_PROXY_URL=${{ secrets.EXPO_PUBLIC_API_PROXY_URL }}"
          } > .env

      - name: Restore upload keystore (path the signing plugin expects)
        run: |
          mkdir -p "$HOME/Documents/Code"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$HOME/Documents/Code/videx-release"
          test -s "$HOME/Documents/Code/videx-release" || { echo "::error::keystore empty — is ANDROID_KEYSTORE_BASE64 set?"; exit 1; }

      - name: Prebuild Android (injects release signing via the config plugin)
        working-directory: native
        run: npx expo prebuild --platform android --no-install

      - name: Build signed release AAB
        working-directory: native/android
        env:
          ORG_GRADLE_PROJECT_VIDEX_UPLOAD_STORE_PASSWORD: ${{ secrets.VIDEX_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VIDEX_UPLOAD_KEY_PASSWORD: ${{ secrets.VIDEX_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Verify signing fingerprint (expect SHA256 99:CE:FF:7E…)
        run: keytool -printcert -jarfile native/android/app/build/outputs/bundle/release/app-release.aab | grep -iA1 'SHA256'

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: videx-release-aab
          path: native/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
