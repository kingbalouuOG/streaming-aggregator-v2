name: Deploy API Worker

# PLAT-2: deploys workers/api (the videx-api Cloudflare Worker) on merge
# to main when the Worker's files changed. Soft-skips until the
# Cloudflare secrets exist (house soft-skip pattern).
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — API token with Workers edit scope
#   CLOUDFLARE_ACCOUNT_ID — the target account
# Worker runtime secrets (TMDB_API_KEY / OMDB_API_KEY) are set once via
# `wrangler secret put`, not through CI.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/api/**'
      - '.github/workflows/deploy-worker.yml'
      # The Worker bundles the legal pages at build time (index.ts imports
      # these as text) — edits to them must trigger a redeploy or the
      # served /privacy + /terms pages silently drift from the repo.
      - 'docs/legal/privacy-policy.md'
      - 'docs/legal/terms-of-service.md'
      # ADR-014 single engine: the Worker imports src/lib directly
      # (recommendations-v2, taste-v2, server/*), so engine changes alter
      # the Worker build without touching workers/api — PR #55's paidTitles
      # section shipped in src/lib and the live Worker silently missed it.
      - 'src/lib/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # wrangler 4.x requires Node >= 22 (first deploy run failed on 20)
          node-version: '22'

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/api
        run: |
          set -e
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Cloudflare secrets not configured; soft-skipping Worker deploy."
            echo "Required: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID."
            exit 0
          fi
          # Root install FIRST: the Worker bundles the engine from
          # src/lib/** (ADR-014), whose imports (@supabase/supabase-js)
          # resolve upward to the ROOT node_modules - wrangler can't see
          # them from workers/api/node_modules alone.
          (cd ../.. && npm ci --no-audit --no-fund)
          npm ci --no-audit --no-fund
          npx wrangler deploy
