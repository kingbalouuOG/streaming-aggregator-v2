name: Deploy API Worker

# PLAT-2: deploys workers/api (the videx-api Cloudflare Worker) on merge
# to main when the Worker's files changed. Soft-skips until the
# Cloudflare secrets exist (house soft-skip pattern).
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — API token with Workers edit scope
#   CLOUDFLARE_ACCOUNT_ID — the target account
# Worker runtime secrets (TMDB_API_KEY / OMDB_API_KEY) are set once via
# `wrangler secret put`, not through CI.

on:
  push:
    branches: [main]
    paths:
      - 'workers/api/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # wrangler 4.x requires Node >= 22 (first deploy run failed on 20)
          node-version: '22'

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/api
        run: |
          set -e
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Cloudflare secrets not configured; soft-skipping Worker deploy."
            echo "Required: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID."
            exit 0
          fi
          npm ci --no-audit --no-fund
          npx wrangler deploy
