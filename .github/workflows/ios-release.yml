name: iOS Release (EAS build → TestFlight)

# Builds the iOS app on EAS Build (cloud macOS), triggered from a Linux
# runner, then — ON A VERSION TAG — submits it to TestFlight via `eas submit`.
# Running from Linux (not Windows) is required: eas-cli can't create the
# src/lib + src/assets junction symlinks in the upload tarball on Windows
# (EPERM). On Linux the postinstall recreates those as real symlinks, so the
# upload to EAS succeeds. The iOS distribution cert + provisioning profile
# AND the App Store Connect API key are already stored on EAS (created during
# the first manual `eas submit`), so CI needs no Apple login and no .p8.
#
# Triggers:
#   • push a tag `v*`  (e.g. `git tag v2.0.2 && git push --tags`) → build + submit to TestFlight
#   • manual "Run workflow"                                        → build-only (no submit)
#
# Required repository secret:
#   EXPO_TOKEN   Expo access token (expo.dev → Account → Settings → Access tokens)
# Also required (one-time, already set): the EAS "production" environment
#   variables (EXPO_PUBLIC_*), and the EAS-stored iOS cert + ASC API key.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout (full repo — native/ depends on ../src/lib)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install native deps (postinstall makes ../src/lib + ../src/assets real symlinks)
        working-directory: native
        run: npm install

      - name: EAS build (iOS, production) — runs on EAS, waits for the .ipa
        working-directory: native
        run: npx eas-cli@latest build --platform ios --profile production --non-interactive

      # Submit to TestFlight — ONLY on a version tag (manual runs stay build-only).
      # Uses the App Store Connect API key already stored on EAS, so there is no
      # .p8 in the repo and no Apple login here — just EXPO_TOKEN.
      - name: Submit to TestFlight
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: native
        run: npx eas-cli@latest submit --platform ios --latest --profile production --non-interactive
