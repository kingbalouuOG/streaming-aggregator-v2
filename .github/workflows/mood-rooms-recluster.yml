name: Mood rooms recluster

# Monthly re-clustering cron. Gate 3 passed 2026-04-21 (run #2 wrote
# version=1 with 69 clusters at 53.0% coverage and OpenAI label
# quality confirmed). workflow_dispatch stays enabled alongside for
# manual re-runs (e.g. after label prompt tuning).
on:
  schedule:
    - cron: '0 3 1 * *'   # 03:00 UTC, 1st of each month
  workflow_dispatch:

jobs:
  recluster:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/mood_rooms/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/mood_rooms/requirements.txt

      - name: Run clustering
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/mood_rooms/recluster.py
