name: Mood rooms recluster

# Schedule is disabled until the first manual workflow_dispatch run is
# validated against the IN-457 gates (cluster count, coverage, coherence).
# See Phase 4.5 plan §2.7. To enable after Gate 3 approval, uncomment the
# two lines below.
on:
  # schedule:
  #   - cron: '0 3 1 * *'   # 03:00 UTC, 1st of each month
  workflow_dispatch:

jobs:
  recluster:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/mood_rooms/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/mood_rooms/requirements.txt

      - name: Run clustering
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/mood_rooms/recluster.py
