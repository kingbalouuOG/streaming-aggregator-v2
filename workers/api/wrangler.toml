# Videx API proxy — PLAT-2 (E&P brief §6, locked D2/D6).
# Secrets (set once via `wrangler secret put`): TMDB_API_KEY,
# OMDB_API_KEY, SUPABASE_SERVICE_ROLE_KEY (PLAT-3).
# Custom domain: videxstreaming.com (zone on the same CF account) is
# attached via the DASHBOARD (Workers & Pages -> videx-api -> Settings ->
# Domains & Routes), NOT via routes here: the CI deploy token has Workers
# scope only, and wrangler-managed custom domains would fail every deploy
# on zone permissions. workers.dev stays live as a legacy alias.

name = "videx-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# nodejs_compat: @supabase/supabase-js (bundled for /v1/foryou, PLAT-3)
# touches process.env/Buffer-adjacent paths at runtime.
compatibility_flags = ["nodejs_compat"]

# Legal pages (launch-compliance §D): bundle the Markdown policy sources
# in docs/legal/*.md as text so GET /privacy + /terms serve the single
# source of truth, rendered to HTML at the edge. Only .md files that are
# actually imported get bundled — this rule just tells esbuild how to
# load them (the wrangler "bundles-from-anywhere" property).
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[vars]
# Public project URL (not a secret — it ships in the client bundle too).
SUPABASE_URL = "https://fmusugdcnnwiuzkbjquo.supabase.co"

# PLAT-3 W3: per-user feed cache. Key = userId : taste_vector_updated_at
# : sliderHash : sorted services; TTL 20 min. An interaction that moves
# the taste vector bumps updated_at and busts the entry naturally.
[[kv_namespaces]]
binding = "FORYOU_CACHE"
id = "e9afd10acedc493e9b9603d4426495fd"

# LAUNCH-1 W1 (IN-PX-60): per-user rate limit on /v1/foryou. Keyed on
# the VERIFIED userId (applied after JWT verification), so an attacker
# can't burn another user's budget and unauthenticated requests are
# already 401-rejected before any cost. 30 requests / 60s — invisible
# to a real session (1-3 feed requests/min) but fatal to the
# cost-amplification loop the security review flagged (full pgvector
# renders at sustained rate). period must be 10 or 60 (CF constraint).
[[ratelimits]]
name = "FORYOU_RATELIMIT"
namespace_id = "1001"

[ratelimits.simple]
limit = 30
period = 60

# PLAT-3 W5: nightly stale-profile recompute (taste vector replay +
# centroid k-means), off the For You hot path. 04:00 UTC — clear of the
# 06:00 UTC sync-incremental pg_cron.
[triggers]
crons = ["0 4 * * *"]

[observability]
enabled = true
